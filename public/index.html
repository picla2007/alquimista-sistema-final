<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema inteligente de generación de landing pages con IA - Modo Agencia y Cliente">
    <title>Generador de Landing Pages con IA - Claude</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Mantenemos tus estilos originales que son excelentes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6;
            --accent: #06b6d4; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --navy: #1e293b; --navy-dark: #0f172a;
            --navy-light: #334155; --gray-50: #f8fafc; --gray-100: #f1f5f9;
            --gray-200: #e2e8f0; --gray-300: #cbd5e1; --gray-400: #94a3b8;
            --gray-500: #64748b; --gray-600: #475569; --gray-700: #334155;
            --gray-800: #1e293b; --gray-900: #0f172a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .app-header {
            background: linear-gradient(135deg, var(--navy-dark) 0%, #1a1f3a 50%, var(--navy) 100%);
            padding: 20px 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 24px; position: relative; overflow: hidden; text-align: center;
        }
        .title-container {
            display: inline-flex; align-items: center; gap: 16px;
            background: rgba(99, 102, 241, 0.25); padding: 16px 32px;
            border-radius: 16px; border: 2px solid rgba(99, 102, 241, 0.4);
        }
        .title-text { font-size: 22px; font-weight: 800; color: white; }
        .app-container { display: flex; gap: 24px; max-width: 1800px; margin: 0 auto; }
        .sidebar { width: 420px; background: var(--navy); padding: 32px; border-radius: 20px; color: white; }
        .main-content { flex: 1; background: white; padding: 32px; border-radius: 20px; min-height: 600px; }
        
        /* Selectores de Modo */
        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-weight: bold; transition: 0.3s; }
        .mode-btn.active.cliente { background: var(--primary); }
        .mode-btn.active.agencia { background: #9333ea; }

        /* Formulario */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; margin-bottom: 5px; color: var(--gray-300); }
        .form-input, .form-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; }
        
        /* Resultados */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .content-section { border: 1px solid var(--gray-200); padding: 15px; border-radius: 12px; }
        .variant-item { background: var(--gray-50); padding: 10px; margin-bottom: 10px; border-radius: 8px; position: relative; font-size: 13px; border-left: 4px solid var(--primary); }
        .variant-copy-btn { position: absolute; right: 5px; top: 5px; font-size: 10px; cursor: pointer; background: white; border: 1px solid #ddd; padding: 2px 5px; border-radius: 4px; }
        
        .btn-generate { width: 100%; padding: 15px; background: var(--primary); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 20px; }
        .btn-generate:disabled { background: var(--gray-500); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Estados principales
            const [modoIA, setModoIA] = useState('cliente');
            const [nicho, setNicho] = useState('');
            const [publico, setPublico] = useState('');
            const [beneficio, setBeneficio] = useState('');
            
            // Estados Agencia
            const [nombreInterno, setNombreInterno] = useState('');
            const [dominio, setDominio] = useState('');

            // Resultados y UI
            const [generando, setGenerando] = useState(false);
            const [outputs, setOutputs] = useState({
                titulos: [], subtitulos: [], descripciones: [], ctas: []
            });

            const generarTextos = async () => {
                if (!nicho || !beneficio) {
                    alert('⚠️ Por favor completa el nicho y el beneficio principal');
                    return;
                }

                setGenerando(true);
                try {
                    const response = await fetch('/api/generate-texts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            nicho, publico, beneficio, modoIA,
                            configAgencia: modoIA === 'agencia' ? { nombreInterno, dominio } : null
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        setOutputs(data.outputs);
                    } else {
                        throw new Error(data.error);
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    setGenerando(false);
                }
            };

            const copiarAlPortapapeles = (texto) => {
                navigator.clipboard.writeText(texto);
                alert('¡Copiado!');
            };

            return (
                <div className="container-fluid">
                    <div className="app-header">
                        <div className="title-container">
                            <span className="title-text">ALQUIMISTA IA: GENERADOR DE LANDINGS</span>
                            <span style={{background: '#10b981', padding: '5px 10px', borderRadius: '5px', fontSize: '10px'}}>PRO 2026</span>
                        </div>
                    </div>

                    <div className="app-container">
                        {/* SIDEBAR DE CONFIGURACIÓN */}
                        <div className="sidebar">
                            <h3 style={{marginBottom: '15px', fontSize: '14px', color: '#818cf8'}}>CONFIGURACIÓN DE IA</h3>
                            
                            <div className="mode-selector">
                                <button 
                                    className={`mode-btn ${modoIA === 'cliente' ? 'active cliente' : ''}`}
                                    onClick={() => setModoIA('cliente')}
                                >👤 CLIENTE</button>
                                <button 
                                    className={`mode-btn ${modoIA === 'agencia' ? 'active agencia' : ''}`}
                                    onClick={() => setModoIA('agencia')}
                                >🎆 AGENCIA</button>
                            </div>

                            <div className="form-group">
                                <label className="form-label">¿Qué vendes? (Nicho)</label>
                                <input className="form-input" value={nicho} onChange={(e) => setNicho(e.target.value)} placeholder="Ej: Curso de Trading" />
                            </div>

                            <div className="form-group">
                                <label className="form-label">¿A quién le vendes?</label>
                                <input className="form-input" value={publico} onChange={(e) => setPublico(e.target.value)} placeholder="Ej: Jóvenes de 20-30 años" />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Beneficio Principal</label>
                                <textarea className="form-input" rows="3" value={beneficio} onChange={(e) => setBeneficio(e.target.value)} placeholder="¿Qué problema resuelves?" />
                            </div>

                            {modoIA === 'agencia' && (
                                <div style={{marginTop: '20px', padding: '15px', background: 'rgba(147, 51, 234, 0.1)', borderRadius: '10px', border: '1px solid rgba(147, 51, 234, 0.3)'}}>
                                    <h4 style={{fontSize: '12px', marginBottom: '10px'}}>DATOS DE AGENCIA</h4>
                                    <input className="form-input" style={{marginBottom: '10px'}} placeholder="Nombre Interno Proyecto" value={nombreInterno} onChange={(e) => setNombreInterno(e.target.value)} />
                                    <input className="form-input" placeholder="Dominio / URL" value={dominio} onChange={(e) => setDominio(e.target.value)} />
                                </div>
                            )}

                            <button className="btn-generate" onClick={generarTextos} disabled={generando}>
                                {generando ? '⌛ PROCESANDO...' : '✨ GENERAR ESTRATEGIA'}
                            </button>
                        </div>

                        {/* CONTENIDO PRINCIPAL - RESULTADOS */}
                        <div className="main-content">
                            {outputs.titulos.length === 0 ? (
                                <div style={{textAlign: 'center', paddingTop: '100px', color: '#94a3b8'}}>
                                    <div style={{fontSize: '50px'}}>🧠</div>
                                    <h3>Esperando instrucciones...</h3>
                                    <p>Configura el panel izquierdo y dale a "Generar"</p>
                                </div>
                            ) : (
                                <div>
                                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '20px'}}>
                                        <h2>Resultados para: {nicho}</h2>
                                        <button onClick={() => window.print()} style={{padding: '8px 15px', borderRadius: '8px', cursor: 'pointer'}}>Descargar PDF</button>
                                    </div>

                                    <div className="content-grid">
                                        <Section title="H1 - Títulos Gancho" icon="🎯" items={outputs.titulos} onCopy={copiarAlPortapapeles} />
                                        <Section title="H2 - Subtítulos" icon="📜" items={outputs.subtitulos} onCopy={copiarAlPortapapeles} />
                                        <Section title="Cuerpo / Descripciones" icon="✍️" items={outputs.descripciones} onCopy={copiarAlPortapapeles} />
                                        <Section title="Llamados a la Acción" icon="🔥" items={outputs.ctas} onCopy={copiarAlPortapapeles} />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function Section({ title, icon, items, onCopy }) {
            return (
                <div className="content-section">
                    <h4 style={{marginBottom: '15px', color: '#1e293b'}}>{icon} {title}</h4>
                    {items.map((item, i) => (
                        <div key={i} className="variant-item">
                            {item}
                            <button className="variant-copy-btn" onClick={() => onCopy(item)}>Copiar</button>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
