<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquimista - Generador de Landing Pages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white font-sans">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2">🚀 Alquimista Sistema</h1>
            <p class="text-indigo-200">Generación Inteligente de Landing Pages con IA</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-6 rounded-2xl shadow-xl">
                <h2 class="text-xl font-semibold mb-6 flex items-center">⚙️ Configuración</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nicho</label>
                        <input type="text" id="nicho" placeholder="Ej: Odontólogos" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Público</label>
                        <input type="text" id="publico" placeholder="Ej: Pacientes con trasplantes" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Beneficio Principal</label>
                        <input type="text" id="beneficio" placeholder="Ej: 60 clientes en 30 días" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>

                    <button onclick="generarTextos()" id="btnGenerar" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition duration-200 flex justify-center items-center gap-2">
                        ✨ Generar Textos
                    </button>
                    
                    <button onclick="exportarTextos()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition duration-200">
                        📥 Exportar a TXT
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-xl">
                        <h3 class="font-bold text-indigo-300 mb-3 border-b border-white/10 pb-2">H1 Títulos</h3>
                        <div id="titulos" class="space-y-2 text-sm">Esperando datos...</div>
                    </div>
                    <div class="glass-card p-4 rounded-xl">
                        <h3 class="font-bold text-indigo-300 mb-3 border-b border-white/10 pb-2">H2 Subtítulos</h3>
                        <div id="subtitulos" class="space-y-2 text-sm">Esperando datos...</div>
                    </div>
                    <div class="glass-card p-4 rounded-xl">
                        <h3 class="font-bold text-indigo-300 mb-3 border-b border-white/10 pb-2">Descripciones</h3>
                        <div id="descripciones" class="space-y-2 text-sm">Esperando datos...</div>
                    </div>
                    <div class="glass-card p-4 rounded-xl">
                        <h3 class="font-bold text-indigo-300 mb-3 border-b border-white/10 pb-2">Call to Action</h3>
                        <div id="ctas" class="space-y-2 text-sm">Esperando datos...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Guardado Automático
        const inputs = ['nicho', 'publico', 'beneficio'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const data = {};
                inputs.forEach(i => data[i] = document.getElementById(i).value);
                localStorage.setItem('alquimista_data', JSON.stringify(data));
            });
        });

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('alquimista_data'));
            if (saved) {
                inputs.forEach(id => document.getElementById(id).value = saved[id] || '');
            }
        };

        // 2. Función Principal de Generación
        async function generarTextos() {
            const btn = document.getElementById('btnGenerar');
            const data = {
                nicho: document.getElementById('nicho').value,
                publico: document.getElementById('publico').value,
                beneficio: document.getElementById('beneficio').value
            };

            if (!data.nicho || !data.beneficio) return alert("Completa los campos principales");

            btn.disabled = true;
            btn.innerText = "⏳ Generando...";

            try {
                const response = await fetch('/api/generate-texts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const res = await response.json();
                if (res.success) {
                    mostrarResultados(res.outputs);
                } else {
                    alert("Error: " + res.error);
                }
            } catch (e) {
                alert("Error de conexión");
            } finally {
                btn.disabled = false;
                btn.innerText = "✨ Generar Textos";
            }
        }

        function mostrarResultados(outputs) {
            const secciones = ['titulos', 'subtitulos', 'descripciones', 'ctas'];
            secciones.forEach(sec => {
                const container = document.getElementById(sec);
                container.innerHTML = outputs[sec].map((txt, i) => 
                    `<div class="bg-white/5 p-2 rounded border border-white/10">
                        <span class="text-indigo-400 font-bold mr-2">#${i+1}</span> ${txt}
                    </div>`
                ).join('');
            });
        }

        // 3. Exportar a TXT
        function exportarTextos() {
            const nicho = document.getElementById('nicho').value || 'campaña';
            let contenido = `ALQUIMISTA - RESULTADOS PARA: ${nicho.toUpperCase()}\n`;
            contenido += `==========================================\n\n`;

            ['titulos', 'subtitulos', 'descripciones', 'ctas'].forEach(id => {
                contenido += `[ ${id.toUpperCase()} ]\n`;
                const elementos = document.getElementById(id).innerText.split('\n');
                elementos.forEach(el => contenido += `${el}\n`);
                contenido += `\n`;
            });

            const blob = new Blob([contenido], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `copy-${nicho}.txt`;
            a.click();
        }// ... (aquí estarían tus otras funciones como generarTextos)

        // 1. Guardar automáticamente al escribir
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => {
                const datos = {
                    nicho: document.getElementById('nicho').value,
                    publico: document.getElementById('publico').value,
                    beneficio: document.getElementById('beneficio').value
                };
                localStorage.setItem('datosAlquimista', JSON.stringify(datos));
            });
        });

        // 2. Cargar al abrir la página
        window.onload = () => {
            const guardado = JSON.parse(localStorage.getItem('datosAlquimista'));
            if (guardado) {
                document.getElementById('nicho').value = guardado.nicho || '';
                document.getElementById('publico').value = guardado.publico || '';
                document.getElementById('beneficio').value = guardado.beneficio || '';
            }
        };

    </script> </body>
</html>
    </script>
</body>
</html>
