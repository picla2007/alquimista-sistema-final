<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquimista Sistema - Generación Inteligente</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #2d3359;
            --bg-sidebar: #1e2243;
            --primary: #9d50f3;
            --primary-light: #a855f7;
            --accent: #00f2fe;
            --text-light: #ffffff;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-wrapper {
            width: 100%;
            max-width: 1400px;
        }

        /* HEADER PREMIUM */
        .main-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        .header-title {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .badge-claude {
            background: #10b981;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        /* SIDEBAR (Configuración) */
        .sidebar {
            background: var(--bg-sidebar);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .section-tag {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        /* Botones de Modo */
        .mode-container {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
        }

        .mode-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-mode {
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #94a3b8;
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .btn-mode.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(157, 80, 243, 0.5);
        }

        /* Inputs Estilizados */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #cbd5e1; }
        .input-dark {
            width: 100%;
            background: #252a4a;
            border: 1px solid #3b426e;
            padding: 14px;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #8e2de2, #4a00e0);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(74, 0, 224, 0.3);
            margin-top: 10px;
        }

        /* CONTENIDO (RESULTADOS) */
        .results-container {
            background: #f1f5f9;
            border-radius: 30px;
            padding: 40px;
            min-height: 800px;
            color: #1e293b;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .grid-outputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card-output {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card-title {
            font-weight: 800;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .variant-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            position: relative;
            display: flex;
            gap: 15px;
        }

        .variant-num {
            background: #6366f1;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            margin-top: 100px;
        }
        
        .empty-icon { font-size: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [modo, setModo] = useState('agencia');
            const [generado, setGenerado] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleGenerar = () => {
                setLoading(true);
                // Simulamos la generación para ver la UI
                setTimeout(() => {
                    setGenerado(true);
                    setLoading(false);
                }, 1000);
            };

            return (
                <div className="app-wrapper">
                    {/* HEADER */}
                    <header className="main-header">
                        <div className="header-title">
                            🚀 Alquimista Sistema <span className="badge-claude">Claude AI</span>
                        </div>
                    </header>

                    <div className="layout">
                        {/* SIDEBAR CONFIG */}
                        <aside className="sidebar">
                            <div className="mode-container">
                                <span className="section-tag">IA: Modo {modo === 'agencia' ? 'Agencia' : 'Cliente'}</span>
                                <div className="mode-switch">
                                    <button className={`btn-mode ${modo === 'cliente' ? 'active' : ''}`} onClick={() => setModo('cliente')}>👤 Modo Cliente</button>
                                    <button className={`btn-mode ${modo === 'agencia' ? 'active' : ''}`} onClick={() => setModo('agencia')}>🎆 Modo Agencia</button>
                                </div>
                            </div>

                            <div className="form-group">
                                <label className="form-label">🎯 NICHO</label>
                                <input className="input-dark" placeholder="odontologos" />
                            </div>

                            <div className="form-group">
                                <label className="form-label">👤 PÚBLICO</label>
                                <input className="input-dark" placeholder="pacientes con trasplantes" />
                            </div>

                            <div className="form-group">
                                <label className="form-label">⭐ BENEFICIO PRINCIPAL</label>
                                <input className="input-dark" placeholder="60 clientes en 30 dias" />
                            </div>

                            {modo === 'agencia' && (
                                <div style={{marginTop: '30px', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '20px'}}>
                                    <span className="section-tag">⚙️ CONFIGURACIÓN PRO</span>
                                    <div className="form-group">
                                        <label className="form-label">Nombre interno</label>
                                        <input className="input-dark" placeholder="Campaña #606" />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Dominio</label>
                                        <input className="input-dark" placeholder="Seleccionar dominio..." />
                                    </div>
                                </div>
                            )}

                            <button className="btn-generate" onClick={handleGenerar}>
                                {loading ? 'PROCESANDO...' : '✨ Generar Textos'}
                            </button>
                        </aside>

                        {/* MAIN RESULTS */}
                        <main className="results-container">
                            {!generado ? (
                                <div className="empty-state">
                                    <div className="empty-icon">🎨</div>
                                    <h2>Listo para crear tu Landing</h2>
                                    <p>Completa los datos y pulsa generar para ver la magia.</p>
                                </div>
                            ) : (
                                <>
                                    <div className="results-header">
                                        <h2 style={{fontWeight: 800}}>Copies variables (A/B)</h2>
                                        <div style={{background: '#10b981', color: 'white', padding: '8px 15px', borderRadius: '8px', fontSize: '12px', fontWeight: 'bold'}}>
                                            ✓ Optimización ON
                                        </div>
                                    </div>

                                    <div className="grid-outputs">
                                        <Section title="H1 Títulos" icon="💜" items={[
                                            "Transforma tu consulta dental con 60 clientes en 30 días",
                                            "La solución que los odontólogos estaban esperando"
                                        ]} />
                                        <Section title="H2 Subtítulos" icon="💙" items={[
                                            "Tecnología de punta al alcance de tu mano",
                                            "Resultados garantizados en 30 días"
                                        ]} />
                                        <Section title="Descripción" icon="🧡" items={[
                                            "Especializado para odontólogos que buscan conectar con pacientes...",
                                            "La herramienta definitiva para el sector."
                                        ]} />
                                        <Section title="Call to Action" icon="🚀" items={[
                                            "Quiero mi consulta gratuita",
                                            "Descubrir cómo funciona"
                                        ]} />
                                    </div>
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        function Section({ title, icon, items }) {
            return (
                <div className="card-output">
                    <div className="card-title">
                        <span>{icon}</span> {title}
                        <span style={{marginLeft: 'auto', background: '#6366f1', color: 'white', fontSize: '10px', padding: '2px 8px', borderRadius: '4px'}}>4</span>
                    </div>
                    {items.map((text, i) => (
                        <div key={i} className="variant-box">
                            <div className="variant-num">#{i+1}</div>
                            <div style={{fontSize: '14px', lineHeight: '1.5', color: '#475569'}}>{text}</div>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
