<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Patcher - Precio Dinámico Fix</title>
<style>
  body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 30px; }
  h2 { color: #6ee7b7; margin-bottom: 16px; }
  .step { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 18px; margin-bottom: 16px; }
  .step-title { color: #a5b4fc; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
  textarea { width: 100%; height: 120px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-family: monospace; font-size: 12px; padding: 10px; resize: vertical; }
  button { padding: 12px 24px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 8px; }
  button:hover { opacity: 0.9; }
  .result { padding: 12px 16px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
  .ok { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); color: #6ee7b7; }
  .err { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
  input[type=file] { margin-top: 8px; color: #94a3b8; }
  .dl-btn { background: linear-gradient(135deg,#f59e0b,#ef4444); }
  #output { display: none; }
</style>
</head>
<body>
<h2>🔧 Fix: Precio Dinámico — Script no inyectado</h2>
<p style="color:#94a3b8;margin-bottom:20px;font-size:13px;">
  El bug: en el template principal de <code>generarHTMLLanding</code>, falta <code>${precioDinamicoScript}</code> en el <code>&lt;script&gt;</code>.<br>
  Este patcher lo agrega automáticamente.
</p>

<div class="step">
  <div class="step-title">📁 Paso 1 — Subí tu archivo HTML</div>
  <input type="file" id="fileInput" accept=".html">
  <div id="fileStatus"></div>
</div>

<div class="step">
  <div class="step-title">🔨 Paso 2 — Aplicar fix</div>
  <button onclick="applyFix()">⚡ Aplicar Parche</button>
  <div id="fixResult"></div>
</div>

<div class="step" id="output">
  <div class="step-title">⬇️ Paso 3 — Descargar archivo corregido</div>
  <button class="dl-btn" onclick="download()">💾 Descargar archivo parcheado</button>
</div>

<script>
let originalContent = '';
let patchedContent = '';

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    originalContent = ev.target.result;
    document.getElementById('fileStatus').innerHTML = 
      `<div class="result ok">✅ Archivo cargado: ${file.name} (${(file.size/1024).toFixed(1)} KB)</div>`;
  };
  reader.readAsText(file);
});

function applyFix() {
  if (!originalContent) {
    document.getElementById('fixResult').innerHTML = '<div class="result err">❌ Primero cargá tu archivo HTML</div>';
    return;
  }

  let content = originalContent;
  let fixes = [];

  // FIX 1: Add ${precioDinamicoScript} to main template script tag
  // The main template has: ${contadorScript}\n(function(){function fixAnchors
  // It should have: ${contadorScript}${precioDinamicoScript}\n(function(){function fixAnchors
  
  const fix1search = '${contadorScript}\n(function(){function fixAnchors';
  const fix1replace = '${contadorScript}${precioDinamicoScript}\n(function(){function fixAnchors';
  
  if (content.includes(fix1search)) {
    content = content.replace(fix1search, fix1replace);
    fixes.push('✅ Fix 1: ${precioDinamicoScript} agregado al script del template principal');
  } else {
    // Try alternative with different whitespace
    const fix1alt = '${contadorScript}\\n(function(){function fixAnchors';
    if (content.includes('${contadorScript}${precioDinamicoScript}')) {
      fixes.push('ℹ️ Fix 1: Ya tenía ${precioDinamicoScript} — no se modificó');
    } else {
      fixes.push('⚠️ Fix 1: No se encontró el patrón exacto — revisá manualmente');
    }
  }

  // FIX 2: Check if precioDinamicoHTML is in the main template
  if (!content.includes('${precioDinamicoHTML}')) {
    // Find position: after ${faqHTML} and before ${formHTML} or the form section
    const insertAfter = '${faqHTML}${precioDinamicoHTML}';
    if (!content.includes(insertAfter)) {
      const pos = content.indexOf('${faqHTML}');
      if (pos > -1) {
        content = content.substring(0, pos) + '${faqHTML}${precioDinamicoHTML}' + content.substring(pos + '${faqHTML}'.length);
        fixes.push('✅ Fix 2: ${precioDinamicoHTML} agregado después de FAQ en el template');
      }
    }
  } else {
    fixes.push('ℹ️ Fix 2: ${precioDinamicoHTML} ya existe en el template');
  }

  // FIX 3: Check precioDinamicoCSS in style tag
  if (!content.includes('${precioDinamicoCSS}')) {
    const styleSearch = '${vslCSS}';
    if (content.includes(styleSearch)) {
      content = content.replace(styleSearch, '${vslCSS}${precioDinamicoCSS}');
      fixes.push('✅ Fix 3: ${precioDinamicoCSS} agregado al bloque de estilos');
    }
  } else {
    fixes.push('ℹ️ Fix 3: ${precioDinamicoCSS} ya existe');
  }

  patchedContent = content;
  
  const html = fixes.map(f => `<div style="margin:4px 0;font-size:13px;">${f}</div>`).join('');
  document.getElementById('fixResult').innerHTML = `<div class="result ok">${html}</div>`;
  document.getElementById('output').style.display = 'block';
}

function download() {
  const blob = new Blob([patchedContent], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'landing-generator-FIXED.html';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
