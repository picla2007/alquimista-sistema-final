<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquimista Sistema - IA Copywriting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #1a1a2e; }
        .gradient-bg { background: radial-gradient(circle at top right, #2d2d5a, #1a1a2e); }
        .glass-card { background: rgba(30, 30, 50, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-shadow { box-shadow: 0 0 20px rgba(79, 70, 229, 0.3); }
        input::placeholder { color: #4b5563; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-slate-200 p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex items-center justify-center gap-3 mb-10">
            <div class="text-3xl">🚀</div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">Alquimista Sistema</h1>
                <p class="text-xs text-indigo-400 font-medium tracking-[0.2em] uppercase text-center">Generación Inteligente de Landing Pages con IA</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card rounded-3xl p-6 shadow-2xl">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="bg-indigo-600/20 p-3 rounded-2xl border border-indigo-500/30">
                            <span class="text-2xl">🤖</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h2 class="text-white font-bold text-lg">IA: Modo Agencia</h2>
                                <span class="bg-white/10 text-[10px] px-2 py-0.5 rounded-md text-white border border-white/10 uppercase tracking-tighter">4 Variantes</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 bg-black/20 p-1 rounded-xl mb-8">
                        <button class="flex items-center justify-center gap-2 py-2.5 rounded-lg text-xs font-semibold text-slate-400 hover:text-white transition">
                            <span>👤</span> Modo Cliente
                        </button>
                        <button class="flex items-center justify-center gap-2 py-2.5 rounded-lg text-xs font-semibold bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 border border-indigo-400/30">
                            <span>🎆</span> Modo Agencia
                        </button>
                    </div>

                    <div class="space-y-5">
                        <div class="group">
                            <label class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 transition group-focus-within:text-indigo-400">
                                🎯 Nicho
                            </label>
                            <input type="text" id="nicho" placeholder="odontologos" class="w-full bg-slate-900/60 border border-white/5 rounded-xl p-4 text-sm text-white focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 outline-none transition">
                        </div>

                        <div class="group">
                            <label class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 transition group-focus-within:text-indigo-400">
                                👥 Público
                            </label>
                            <input type="text" id="publico" placeholder="pacientes con trasplantes" class="w-full bg-slate-900/60 border border-white/5 rounded-xl p-4 text-sm text-white focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 outline-none transition">
                        </div>

                        <div class="group">
                            <label class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 transition group-focus-within:text-indigo-400">
                                ⭐ Beneficio Principal
                            </label>
                            <input type="text" id="beneficio" placeholder="60 clientes en 30 días" class="w-full bg-slate-900/60 border border-white/5 rounded-xl p-4 text-sm text-white focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/30 outline-none transition">
                        </div>

                        <button onclick="generarTextos()" id="btnGenerar" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-bold py-4 rounded-2xl shadow-xl flex justify-center items-center gap-3 transition-all active:scale-[0.98]">
                            <span class="text-xl">✨</span> Generar Textos
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="glass-card rounded-3xl p-6 h-full">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">📝</span>
                            <h2 class="text-xl font-bold text-white">Copies variables (A/B)</h2>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="exportarTextos()" class="bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 border border-emerald-500/30 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition">
                                💾 Exportar Textos
                            </button>
                            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition">
                                🗑️ Resetear
                            </button>
                            <div class="flex items-center gap-2 bg-emerald-500/10 px-3 py-2 rounded-xl border border-emerald-500/20">
                                <span class="text-[10px] font-bold text-emerald-400 uppercase">Optimización ON</span>
                                <div class="w-3 h-3 bg-emerald-500 rounded-sm shadow-[0_0_8px_#10b981]"></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/5">
                                <div class="flex items-center gap-2 font-bold text-indigo-300 text-sm">
                                    <span>💜</span> H1 Títulos
                                </div>
                                <span class="bg-indigo-500/20 text-indigo-400 text-[10px] px-2 py-0.5 rounded-full font-bold">4</span>
                            </div>
                            <div id="titulos" class="space-y-3">
                                <div class="bg-white/5 border border-white/5 p-4 rounded-2xl text-xs text-slate-400 italic">Configura tu proyecto y genera textos...</div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/5">
                                <div class="flex items-center gap-2 font-bold text-sky-300 text-sm">
                                    <span>💙</span> H2 Subtítulos
                                </div>
                                <span class="bg-sky-500/20 text-sky-400 text-[10px] px-2 py-0.5 rounded-full font-bold">4</span>
                            </div>
                            <div id="subtitulos" class="space-y-3"></div>
                        </div>

                        <div class="space-y-4">
                            <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/5">
                                <div class="flex items-center gap-2 font-bold text-orange-300 text-sm">
                                    <span>🧡</span> Descripción
                                </div>
                                <span class="bg-orange-500/20 text-orange-400 text-[10px] px-2 py-0.5 rounded-full font-bold">4</span>
                            </div>
                            <div id="descripciones" class="space-y-3"></div>
                        </div>

                        <div class="space-y-4">
                            <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/5">
                                <div class="flex items-center gap-2 font-bold text-violet-300 text-sm">
                                    <span>🚀</span> Call to Action
                                </div>
                                <span class="bg-violet-500/20 text-violet-400 text-[10px] px-2 py-0.5 rounded-full font-bold">4</span>
                            </div>
                            <div id="ctas" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
    // Variables de Estado Global
    const STORAGE_KEY = 'alquimista_pro_data';
    const fields = ['nicho', 'publico', 'beneficio'];
    let modoActual = 'agencia'; // Por defecto

    // 1. Lógica de los Botones de Modo (¡LA PARTE QUE FALTABA!)
    function cambiarModo(modo) {
        modoActual = modo;
        const btnCliente = document.getElementById('btn-cliente');
        const btnAgencia = document.getElementById('btn-agencia');
        const labelModo = document.getElementById('label-modo-ia');

        if (modo === 'cliente') {
            // Estilo Cliente
            btnCliente.className = "flex items-center justify-center gap-2 py-2.5 rounded-lg text-xs font-semibold bg-slate-700 text-white border border-slate-500 shadow-inner";
            btnAgencia.className = "flex items-center justify-center gap-2 py-2.5 rounded-lg text-xs font-semibold text-slate-400 hover:text-white transition";
            labelModo.innerText = "IA: Modo Cliente";
        } else {
            // Estilo Agencia
            btnAgencia.className = "flex items-center justify-center gap-2 py-2.5 rounded-lg text-xs font-semibold bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 border border-indigo-400/30";
            btnCliente.className = "flex items-center justify-center gap-2 py-2.5 rounded-lg text-xs font-semibold text-slate-400 hover:text-white transition";
            labelModo.innerText = "IA: Modo Agencia";
        }
        
        // Guardar preferencia de modo
        localStorage.setItem('alquimista_modo', modo);
    }

    // 2. Persistencia (Guardado Automático)
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
            const data = {};
            fields.forEach(f => data[f] = document.getElementById(f).value);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        });
    });

    window.onload = () => {
        // Cargar datos del formulario
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved) fields.forEach(f => document.getElementById(f).value = saved[f] || '');
        
        // Cargar modo preferido
        const modoGuardado = localStorage.getItem('alquimista_modo');
        if (modoGuardado) cambiarModo(modoGuardado);
    };

    // 3. Generación (Enviando el modo a la API)
    async function generarTextos() {
        const btn = document.getElementById('btnGenerar');
        const data = {
            nicho: document.getElementById('nicho').value,
            publico: document.getElementById('publico').value,
            beneficio: document.getElementById('beneficio').value,
            modo: modoActual // Enviamos si es cliente o agencia
        };

        if (!data.nicho || !data.beneficio) return alert("Faltan datos clave");

        btn.disabled = true;
        btn.innerHTML = `<span class="animate-spin text-xl">🌀</span> Procesando...`;

        try {
            const response = await fetch('/api/generate-texts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const res = await response.json();
            if (res.success) render(res.outputs);
            else alert("Error: " + res.error);
        } catch (e) {
            alert("Error de conexión");
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<span class="text-xl">✨</span> Generar Textos`;
        }
    }

    // Función Render (Visualización de resultados)
    function render(outputs) {
        const mappings = {
            titulos: { id: 'titulos', color: 'indigo' },
            subtitulos: { id: 'subtitulos', color: 'sky' },
            descripciones: { id: 'descripciones', color: 'orange' },
            ctas: { id: 'ctas', color: 'violet' }
        };

        Object.entries(mappings).forEach(([key, cfg]) => {
            const container = document.getElementById(cfg.id);
            container.innerHTML = outputs[key].map((txt, i) => `
                <div class="bg-slate-900/40 border border-white/5 p-4 rounded-2xl flex gap-3 group hover:border-${cfg.color}-500/30 transition shadow-sm">
                    <span class="flex-shrink-0 w-6 h-6 rounded-lg bg-${cfg.color}-500/20 text-${cfg.color}-400 flex items-center justify-center text-[10px] font-bold border border-${cfg.color}-500/20">#${i+1}</span>
                    <p class="text-xs leading-relaxed text-slate-300">${txt}</p>
                </div>
            `).join('');
        });
    }

    // Exportar TXT
    function exportarTextos() {
        const nicho = document.getElementById('nicho').value || 'campaña';
        let content = `ALQUIMISTA IA - MODO: ${modoActual.toUpperCase()}\n`;
        content += `COPIES PARA: ${nicho.toUpperCase()}\n\n`;
        
        ['titulos', 'subtitulos', 'descripciones', 'ctas'].forEach(id => {
            content += `--- ${id.toUpperCase()} ---\n`;
            const items = document.getElementById(id).innerText.split('\n');
            items.forEach(txt => { if(txt.trim() && !txt.includes('#')) content += `${txt}\n`; });
            content += `\n`;
        });

        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Alquimista_${nicho}.txt`;
        a.click();
    }
</script>
