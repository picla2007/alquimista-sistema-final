<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Landing Pages con IA - Claude</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#6366f1;
            --primary-dark:#4f46e5;
            --secondary:#8b5cf6;
            --accent:#06b6d4;
            --success:#10b981;
            --navy:#1e293b;
            --navy-dark:#0f172a;
            --gray-100:#f1f5f9;
            --gray-200:#e2e8f0;
            --gray-800:#1e293b;
            /* Glassmorphism Effect */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            min-height: 100vh;
            color: #f8fafc;
            padding: 24px;
        }

        /* HEADER OPTIMIZADO */
        .app-header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            padding: 24px 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            margin-bottom: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .title-container {
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(99,102,241,0.3);
        }

        .title-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CONTENEDOR PRINCIPAL */
        .app-container {
            display: flex;
            gap: 24px;
            max-width: 1700px;
            margin: 0 auto;
        }

        /* SIDEBAR ESTILO DARK PREMIUM */
        .sidebar {
            width: 420px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 32px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .ia-mode-section {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .form-input, .form-select, .beneficio-input, .fq-input {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important;
        }

        /* MAIN CONTENT ESTILO CLEAN WHITE */
        .main-content {
            flex: 1;
            background: #ffffff;
            padding: 40px;
            border-radius: 28px;
            color: var(--navy-dark);
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
        }

        .content-title {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
        }

        /* TARJETAS DE COPIES (Estilo A/B de tus fotos) */
        .variant-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .variant-item:hover {
            border-color: var(--primary);
            transform: scale(1.01);
            background: #fff;
        }

        .variant-number {
            background: var(--primary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* BOTONES */
        .btn-generate {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-generar-landing {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        /* SCROLLBAR CUSTOM */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Aquí iría tu código de React sin cambios en la lógica,
        // solo se verá afectado por los estilos de arriba.
    </script>
</body>
</html>
